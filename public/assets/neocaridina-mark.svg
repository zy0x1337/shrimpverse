<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Shrimpverse Icon">
  <rect width="96" height="96" rx="14" fill="#f4f6f5"/>
  <g transform="translate(6 6) scale(2.3333)">
