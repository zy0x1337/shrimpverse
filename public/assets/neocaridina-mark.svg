    <circle cx="18" cy="18" r="11.5" fill="none" stroke="#2fc4b5" stroke-width="0.5" stroke-dasharray="2 3.5" opacity="0.3"/>
    <!-- Rostrum -->
    <path d="M9 14.5 L4.3 11 L9.6 13.2 Z" fill="#2fc4b5" opacity="0.85"/>
    <!-- Cephalothorax -->
