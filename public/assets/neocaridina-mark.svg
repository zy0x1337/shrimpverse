    <path d="M23.5 15.5 C26.5 15 28.5 16.3 28.8 19 C27 19.6 24.5 19 23 17 Z" fill="#2fc4b5" opacity="0.72"/>
    <path d="M25.8 18 C28.8 17.8 30.5 19.3 30.2 22 C28.3 22.2 26.2 21.2 25 19.3 Z" fill="#2fc4b5" opacity="0.62"/>
